name: access-review-default
title: "[Default] Quy trình rà soát quyền truy cập"
description: >
  Quy trình review quyền truy cập định kỳ theo ISO 27001 A.5.18 và
  CIS Control 6. Bao gồm: scope, data collection, review, remediation, reporting.
  Dùng khi chưa có quy trình access review riêng.
category: grc
type: default

agent: grc-advisor
skills:
  - compliance-frameworks

input:
  - field: review_scope
    prompt: "Scope review? (toàn bộ / hệ thống cụ thể / department)"
    type: text
    required: true
  - field: review_type
    prompt: "Loại review?"
    type: choice
    options: [Định kỳ (quarterly/annual), Sau sự cố, Sau thay đổi tổ chức, Audit requirement]
    required: true
  - field: systems
    prompt: "Hệ thống cần review? (AD, GitLab, SIEM, Database, ...)"
    type: multiline
    required: false
    auto_from: context/company-profile.yaml

output:
  format: access-review-report
  sections:
    - review-scope
    - data-collection-checklist
    - review-criteria
    - findings
    - remediation-actions
    - sign-off-template
  language: vi

keywords:
  - access review
  - quyền truy cập
  - rà soát
  - user access
  - privilege
  - đặc quyền
  - onboarding
  - offboarding
triggers:
  - "review quyền truy cập"
  - "access review"
  - "rà soát tài khoản"
priority: 3

tags: [grc, access-control, default, iso-27001]
version: "1.0.0"
author: cyberops-defaults
