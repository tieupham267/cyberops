name: vuln-management-default
title: "[Default] Quy trình quản lý lỗ hổng bảo mật"
description: >
  Quy trình xử lý lỗ hổng từ phát hiện đến remediation theo NIST SP 800-40.
  Bao gồm: triage, risk-based prioritization (SSVC), assign owner, track SLA.
  Dùng khi chưa có quy trình vuln management riêng.
category: soc
type: default

agent: vuln-manager
skills: []

escalate:
  target: emergency-patch
  criteria:
    - "CVSS >= 9.0 (Critical severity)"
    - "Actively exploited — đã có trong CISA KEV catalog"
    - "Supply chain compromise có install scripts (postinstall/preinstall)"
    - "POC public + internet-facing + asset criticality >= business critical"
    - "Vendor phát hành emergency advisory / out-of-band patch"
    - "Exploit trivial (không cần special tools/privileges) + blast radius rộng"
  carry_fields:
    vuln_source: vuln_source
    vuln_detail: vuln_detail
  prompt_user: true

input:
  - field: vuln_source
    prompt: "Nguồn phát hiện lỗ hổng?"
    type: choice
    options: [Vulnerability scan, Pentest, Bug bounty, Vendor advisory, Threat intel, Tự phát hiện, Khác]
    required: true
  - field: vuln_detail
    prompt: "Chi tiết lỗ hổng (CVE, mô tả, hệ thống affected)?"
    type: multiline
    required: true
  - field: scan_results
    prompt: "File scan results (nếu có)?"
    type: file
    required: false

output:
  format: vuln-management-report
  sections:
    - vuln-triage
    - risk-prioritization
    - escalation-assessment
    - remediation-plan
    - owner-assignment
    - sla-tracking
    - verification-plan
  language: bilingual

keywords:
  - vulnerability
  - lỗ hổng
  - cve
  - patch
  - remediation
  - scan
  - pentest findings
triggers:
  - "có lỗ hổng mới"
  - "kết quả pentest"
  - "vulnerability report"
  - "cần patch"
priority: 2

tags: [soc, vulnerability, default]
version: "1.1.0"
author: cyberops-defaults
